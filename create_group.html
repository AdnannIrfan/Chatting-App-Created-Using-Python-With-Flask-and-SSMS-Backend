<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Group</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    
    body {
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      color: #d1f0f0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 25, 40, 0.85);
      z-index: -1;
    }

    .container {
      margin-top: 80px;
      max-width: 550px;
      background: rgba(5, 45, 55, 0.9);
      padding: 30px 25px;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(0, 120, 130, 0.6);
      color: #b9e5e5;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0, 150, 170, 0.75);
    }

    h2 {
      font-weight: 700;
      color: #38b2ac; 
      text-shadow: 0 0 8px #4fd1c5;
    }

    label {
      font-weight: 600;
      color: #a1d9d9;
    }

    input.form-control,
    textarea.form-control {
      background-color: #104547;
      border: 1px solid #3bc4c1;
      color: #cff7f7;
      transition: border-color 0.3s ease;
    }

    input.form-control:focus,
    textarea.form-control:focus {
      background-color: #0b3337;
      border-color: #38b2ac;
      color: #e0ffff;
      box-shadow: 0 0 10px #38b2ac;
    }

    button.btn-light {
      font-weight: 700;
      background-color: #319795; 
      color: #e0f7f7;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(49, 151, 149, 0.7);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    button.btn-light:hover {
      background-color: #2c7a7b;
      color: #a0e7e7;
      box-shadow: 0 6px 25px rgba(44, 122, 123, 0.9);
    }

    
    .btn-home {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 180px;
      font-weight: 600;
      border-radius: 50px;
      background: #319795; 
      color: #e0f7f7;
      box-shadow: 0 4px 15px rgba(49, 151, 149, 0.7);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
      text-align: center;
      line-height: 38px;
      text-decoration: none;
      display: inline-block;
    }

    .btn-home:hover {
      background-color: #2c7a7b;
      box-shadow: 0 6px 25px rgba(44, 122, 123, 0.9);
      color: #e0f7f7;
      text-decoration: none;
    }

    
    footer {
      width: 100%;
      text-align: center;
      padding: 15px 0;
      font-size: 1.1rem;
      color: #38b2ac; 
      position: fixed;
      bottom: 0;
      left: 0;
      font-weight: 600;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 6px #4fd1c5;
      background: transparent;
      z-index: 5;
    }

    footer span {
      color: #2c7a7b; 
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 class="text-center mb-4">Create a Group</h2>
    <form action="/create_group" method="post">
      <div class="mb-3">
        <label for="group_name" class="form-label">Group Name</label>
        <input type="text" class="form-control" id="group_name" name="group_name" required />
      </div>
      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
      </div>
      <div class="mb-3">
        <label for="created_by" class="form-label">Created By (User ID)</label>
        <input type="number" class="form-control" id="created_by" name="created_by" required />
      </div>
      <button type="submit" class="btn btn-light w-100">Create Group</button>
    </form>
  </div>

  
  <a href="/" class="btn-home">Return to Home Page</a>

  
  <footer>✨ Created by Rabiya 😊 ✨</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
