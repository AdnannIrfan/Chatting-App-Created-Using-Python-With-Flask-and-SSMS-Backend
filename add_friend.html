<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Friend</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    
    body {
      background: url('https://images.unsplash.com/photo-1511988617509-a57c8a288659?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      color: #f0f0f0;
    }

    
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .container {
      margin-top: 80px;
      max-width: 500px;
      background: rgba(33, 37, 41, 0.85); 
      padding: 30px 25px;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      color: #eee;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.75);
    }

    h2 {
      font-weight: 700;
      color: #ffd700;
      text-shadow: 0 0 5px #ffc107;
    }

    label {
      font-weight: 600;
      color: #f1f1f1;
    }

    input.form-control {
      background-color: #444;
      border: 1px solid #555;
      color: #eee;
      transition: border-color 0.3s ease;
    }

    input.form-control:focus {
      background-color: #333;
      border-color: #ffd700;
      color: #fff;
      box-shadow: 0 0 8px #ffd700;
    }

    button.btn-light {
      font-weight: 700;
      background-color: #ffd700;
      color: #222;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.7);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    button.btn-light:hover {
      background-color: #ffc107;
      color: #000;
      box-shadow: 0 6px 25px rgba(255, 193, 7, 0.9);
    }

    
    .btn-home {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 180px;
      font-weight: 600;
      border-radius: 50px;
      background: #ffd700;
      color: #222;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.7);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
      text-align: center;
      line-height: 38px;
      text-decoration: none;
      display: inline-block;
    }

    .btn-home:hover {
      background-color: #ffc107;
      box-shadow: 0 6px 25px rgba(255, 193, 7, 0.9);
      color: #000;
      text-decoration: none;
    }

    
    footer {
      width: 100%;
      text-align: center;
      padding: 15px 0;
      font-size: 1.1rem;
      color: #ffd700;
      position: fixed;
      bottom: 0;
      left: 0;
      font-weight: 600;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 5px #ffae00;
      background: transparent;
      z-index: 5;
    }

    footer span {
      color: #ff7f50;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 class="text-center mb-4">Add a Friend</h2>
    <form action="/add_friend" method="post">
      <div class="mb-3">
        <label for="user_id" class="form-label">Your User ID</label>
        <input type="number" class="form-control" id="user_id" name="user_id" required />
      </div>
      <div class="mb-3">
        <label for="friend_id" class="form-label">Friend User ID</label>
        <input type="number" class="form-control" id="friend_id" name="friend_id" required />
      </div>
      <button type="submit" class="btn btn-light w-100">Add Friend</button>
    </form>
  </div>

  
  <a href="/" class="btn-home">Return to Home Page</a>

  
  <footer>✨ Created by Rabiya 😊 ✨</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
