<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Group Member</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    
    body {
      background: url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      color: #fff4e6;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(94, 38, 18, 0.85);
      z-index: -1;
    }

    .container {
      margin-top: 80px;
      max-width: 500px;
      background: rgba(146, 69, 24, 0.9); 
      padding: 30px 25px;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(204, 85, 0, 0.7);
      color: #fff4e6;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(204, 85, 0, 0.9);
    }

    h2 {
      font-weight: 700;
      color: #ff9f1c; 
      text-shadow: 0 0 8px #ffb347;
    }

    label {
      font-weight: 600;
      color: #ffd8a9;
    }

    input.form-control {
      background-color: #6b3e16; 
      border: 1px solid #ff9f1c;
      color: #fff4e6;
      transition: border-color 0.3s ease;
    }

    input.form-control:focus {
      background-color: #7f4e1a;
      border-color: #ffb347;
      color: #fff9f0;
      box-shadow: 0 0 10px #ffb347;
    }

    button.btn-light {
      font-weight: 700;
      background-color: #ff6f3c; 
      color: #fff9f0;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(255, 111, 60, 0.7);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    button.btn-light:hover {
      background-color: #e05a1b;
      color: #fff9f0;
      box-shadow: 0 6px 25px rgba(224, 90, 27, 0.9);
    }

    
    .btn-home {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 180px;
      font-weight: 600;
      border-radius: 50px;
      background: #ff6f3c; 
      color: #fff9f0;
      box-shadow: 0 4px 15px rgba(255, 111, 60, 0.7);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
      text-align: center;
      line-height: 38px;
      text-decoration: none;
      display: inline-block;
    }

    .btn-home:hover {
      background-color: #e05a1b;
      box-shadow: 0 6px 25px rgba(224, 90, 27, 0.9);
      color: #fff9f0;
      text-decoration: none;
    }

    
    footer {
      width: 100%;
      text-align: center;
      padding: 15px 0;
      font-size: 1.1rem;
      color: #ffb347; 
      position: fixed;
      bottom: 0;
      left: 0;
      font-weight: 600;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 6px #ff9f1c;
      background: transparent;
      z-index: 5;
    }

    footer span {
      color: #e05a1b; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-center mb-4">Add Member to Group</h2>
    <form action="/add_group_member" method="post">
      <div class="mb-3">
        <label for="group_id" class="form-label">Group ID</label>
        <input type="number" class="form-control" id="group_id" name="group_id" required />
      </div>
      <div class="mb-3">
        <label for="user_id" class="form-label">User ID</label>
        <input type="number" class="form-control" id="user_id" name="user_id" required />
      </div>
      <button type="submit" class="btn btn-light w-100">Add Member</button>
    </form>
  </div>

 
  <a href="/" class="btn-home">Return to Home Page</a>


  <footer>🍂 Created by Rabiya 😊 🍁</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
