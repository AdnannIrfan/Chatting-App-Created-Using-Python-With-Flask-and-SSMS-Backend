<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Block User</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1520975918311-63c5b55d0d4b?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      color: #f0f0f0;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }

    .card {
      margin-top: 80px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
      color: #212529;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
    }

    h2 {
      font-weight: 700;
      color: #2c3e50;
    }

    
    footer {
      width: 100%;
      text-align: center;
      padding: 15px 0;
      font-size: 1.1rem;
      color: #ffb6b9; 
      position: fixed;
      bottom: 0;
      left: 0;
      font-weight: 600;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 6px #c49fff; 
      background: transparent;
    }

    footer span {
      color: #ff69b4; 
    }

    
    .btn-home {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 180px;
      font-weight: 600;
      border-radius: 50px;
      background: #e83e8c;
      box-shadow: 0 4px 15px rgba(232, 62, 140, 0.6);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
      color: white;
    }

    .btn-home:hover {
      background-color: #c82368;
      box-shadow: 0 6px 25px rgba(200, 35, 104, 0.9);
      text-decoration: none;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container d-flex justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <h2 class="text-center mb-4">Block User</h2>

        

        <form action="/block_user" method="POST" onsubmit="showPopup()">
          <div class="mb-3">
            <label for="blocker_id" class="form-label">Blocker ID</label>
            <input type="number" class="form-control" name="blocker_id" required>
          </div>
          <div class="mb-3">
            <label for="blocked_id" class="form-label">Blocked ID</label>
            <input type="number" class="form-control" name="blocked_id" required>
          </div>
          <button type="submit" class="btn btn-danger w-100">Block User</button>
        </form>
      </div>
    </div>
  </div>

 
  <a href="/" class="btn btn-home text-white">Return to Home Page</a>

  
  <footer>✨ Created by <span>Rabiya 😊</span> ✨</footer>

  <script>
    function showPopup() {
      setTimeout(() => {
        Swal.fire('Blocked!', 'User has been blocked.', 'success');
      }, 300);
    }
  </script>
</body>
</html>
