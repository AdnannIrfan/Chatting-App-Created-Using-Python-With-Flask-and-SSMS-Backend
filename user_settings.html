<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1581091870622-1e7bfa5f9c20?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      color: #ffffff;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .card {
      margin-top: 80px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      color: #2d3436;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.35);
    }

    h2 {
      font-weight: bold;
      color: #0984e3;
    }

    .btn-submit {
      background: #00b894;
      color: white;
      font-weight: 600;
      border-radius: 8px;
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-submit:hover {
      background: #019875;
      box-shadow: 0 4px 20px rgba(0, 184, 148, 0.5);
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 15px 0;
      font-size: 1.1rem;
      color: #81ecec;
      position: fixed;
      bottom: 0;
      left: 0;
      font-weight: 600;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 6px #55efc4;
    }

    footer span {
      color: #00cec9;
    }

    
    .btn-home {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #0984e3;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 7px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(9, 132, 227, 0.7);
      transition: background-color 0.3s ease;
      z-index: 10;
    }
    .btn-home:hover {
      background-color: #74b9ff;
      text-decoration: none;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container d-flex justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <h2 class="text-center mb-4">Update User Settings</h2>

        <form action="/update_setting" method="POST" onsubmit="showPopup()">
          <div class="mb-3">
            <label for="user_id" class="form-label">User ID</label>
            <input type="number" class="form-control" name="user_id" required>
          </div>
          <div class="mb-3">
            <label for="setting_key" class="form-label">Setting Key</label>
            <input type="text" class="form-control" name="setting_key" required>
          </div>
          <div class="mb-3">
            <label for="setting_value" class="form-label">Setting Value</label>
            <input type="text" class="form-control" name="setting_value" required>
          </div>
          <button type="submit" class="btn btn-submit w-100">Update Setting</button>
        </form>
      </div>
    </div>
  </div>

  
  <a href="/" class="btn-home"> Return to Homepage</a>

  
  <footer>✨ Created by <span>Rabiya 😊</span> ✨</footer>

  <script>
    function showPopup() {
      setTimeout(() => {
        Swal.fire('Updated!', 'User setting updated.', 'success');
      }, 300);
    }
  </script>
</body>
</html>
