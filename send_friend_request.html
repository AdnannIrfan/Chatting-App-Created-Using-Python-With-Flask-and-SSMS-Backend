<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Send Friend Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
   
    body {
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      color: #d0f0f0;
    }

    
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 50, 50, 0.7);
      z-index: -1;
    }

    .container {
      margin-top: 80px;
      max-width: 500px;
      background: rgba(0, 70, 70, 0.85);
      padding: 30px 25px;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(0, 100, 100, 0.6);
      color: #ccf2f4;
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0, 120, 120, 0.75);
    }

    h2 {
      font-weight: 700;
      color: #ff6f61; /* Coral */
      text-shadow: 0 0 8px #ff8a75;
    }

    label {
      font-weight: 600;
      color: #b2e0e3;
    }

    input.form-control {
      background-color: #225353;
      border: 1px solid #2aa198;
      color: #cdf1f2;
      transition: border-color 0.3s ease;
    }

    input.form-control:focus {
      background-color: #1b4141;
      border-color: #ff6f61;
      color: #fff;
      box-shadow: 0 0 10px #ff6f61;
    }

    button.btn-light {
      font-weight: 700;
      background-color: #ff6f61; 
      color: #fff;
      border-radius: 50px;
      box-shadow: 0 4px 15px rgba(255, 111, 97, 0.7);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    button.btn-light:hover {
      background-color: #ff8a75;
      color: #222;
      box-shadow: 0 6px 25px rgba(255, 138, 117, 0.9);
    }

    
    .btn-home {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 180px;
      font-weight: 600;
      border-radius: 50px;
      background: #2aa198;
      color: #fff;
      box-shadow: 0 4px 15px rgba(42, 161, 152, 0.7);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
      text-align: center;
      line-height: 38px;
      text-decoration: none;
      display: inline-block;
    }

    .btn-home:hover {
      background-color: #1f7a76;
      box-shadow: 0 6px 25px rgba(31, 122, 118, 0.9);
      color: #fff;
      text-decoration: none;
    }

    
    footer {
      width: 100%;
      text-align: center;
      padding: 15px 0;
      font-size: 1.1rem;
      color: #ff6f61; 
      position: fixed;
      bottom: 0;
      left: 0;
      font-weight: 600;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 6px #ff8a75;
      background: transparent;
      z-index: 5;
    }

    footer span {
      color: #2aa198; 
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 class="text-center mb-4">Send Friend Request</h2>
    <form action="/send_friend_request" method="post">
      <div class="mb-3">
        <label for="sender_id" class="form-label">Your User ID</label>
        <input type="number" class="form-control" id="sender_id" name="sender_id" required />
      </div>
      <div class="mb-3">
        <label for="receiver_id" class="form-label">Receiver User ID</label>
        <input type="number" class="form-control" id="receiver_id" name="receiver_id" required />
      </div>
      <button type="submit" class="btn btn-light w-100">Send Request</button>
    </form>
  </div>

  
  <a href="/" class="btn-home">Return to Home Page</a>

  
  <footer>✨ Created by Rabiya 😊 ✨</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
