<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Notification</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1557682250-33bd709cbe85?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .card {
      margin-top: 80px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.97);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      color: #2c3e50;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    }

    h2 {
      font-weight: bold;
      color: #6c5ce7;
    }

    .btn-submit {
      background: #00a8ff;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .btn-submit:hover {
      background: #0984e3;
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(0, 168, 255, 0.5);
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 15px 0;
      font-size: 1.1rem;
      color: #a29bfe;
      font-weight: 600;
      position: fixed;
      bottom: 0;
      left: 0;
      text-shadow: 0 0 6px #81ecec;
    }

    footer span {
      color: #00cec9;
    }

    
    .return-home {
      position: fixed;
      bottom: 60px; 
      right: 20px;
      color: #00a8ff;
      font-weight: bold;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.85);
      padding: 8px 12px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0, 168, 255, 0.5);
      transition: background 0.3s ease;
      z-index: 1000;
    }

    .return-home:hover {
      background: #00a8ff;
      color: white;
    }
  </style>
</head>
<body>

  <a href="/" class="return-home">Return to Homepage</a>

  <div class="container d-flex justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <h2 class="text-center mb-4">Add Notification</h2>

        <form action="/add_notification" method="POST" onsubmit="showPopup()">
          <div class="mb-3">
            <label for="user_id" class="form-label">User ID</label>
            <input type="number" class="form-control" name="user_id" required>
          </div>
          <div class="mb-3">
            <label for="notification_text" class="form-label">Notification Text</label>
            <input type="text" class="form-control" name="notification_text" required>
          </div>
          <button type="submit" class="btn btn-submit w-100">Add Notification</button>
        </form>
      </div>
    </div>
  </div>

  
  <footer>✨ Created by <span>Rabiya 😊</span> ✨</footer>

  <script>
    function showPopup() {
      setTimeout(() => {
        Swal.fire('Added!', 'Notification added successfully.', 'success');
      }, 300);
    }
  </script>
</body>
</html>
