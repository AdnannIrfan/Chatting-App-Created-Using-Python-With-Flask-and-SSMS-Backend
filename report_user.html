<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Report User</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #f0f0f0;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(20, 30, 48, 0.75);
      z-index: -1;
    }

    .card {
      margin-top: 70px;
      padding: 30px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      color: #222;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.55);
    }

    h2 {
      font-weight: 700;
      color: #d63031; 
      text-shadow: 0 1px 3px rgba(214, 48, 49, 0.6);
    }

    .btn-submit {
      background-color: #d63031;
      color: white;
      font-weight: 600;
      border-radius: 8px;
      transition: background-color 0.3s ease, transform 0.2s ease;
      border: none;
    }

    .btn-submit:hover {
      background-color: #e17055;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(214, 48, 49, 0.6);
    }

    .btn-home {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #0984e3;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 7px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 12px rgba(9, 132, 227, 0.7);
      transition: background-color 0.3s ease;
      z-index: 10;
    }

    .btn-home:hover {
      background-color: #74b9ff;
      text-decoration: none;
      color: white;
    }

    textarea.form-control {
      resize: vertical;
      min-height: 100px;
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 12px 0;
      font-size: 1rem;
      color: #fd79a8;
      font-weight: 600;
      position: fixed;
      bottom: 0;
      left: 0;
      text-shadow: 0 0 6px #d63031;
      background: rgba(0,0,0,0.15);
    }

    footer span {
      color: #e84393;
    }
  </style>
</head>
<body>

  
  <a href="/" class="btn-home">🏠 Return to Homepage</a>

  <div class="container d-flex justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <h2 class="text-center mb-4">Report a User</h2>

        <form action="/create_report" method="POST" onsubmit="showPopup()">
          <div class="mb-3">
            <label for="reporter_id" class="form-label">Reporter ID</label>
            <input type="number" class="form-control" name="reporter_id" required />
          </div>
          <div class="mb-3">
            <label for="reported_user_id" class="form-label">Reported User ID</label>
            <input type="number" class="form-control" name="reported_user_id" required />
          </div>
          <div class="mb-3">
            <label for="report_text" class="form-label">Report Text</label>
            <textarea class="form-control" name="report_text" required></textarea>
          </div>
          <button type="submit" class="btn btn-submit w-100">Submit Report</button>
        </form>
      </div>
    </div>
  </div>

  <footer>✨ Created by <span>Rabiya 😊</span> ✨</footer>

  <script>
    function showPopup() {
      setTimeout(() => {
        Swal.fire('Reported!', 'User report submitted.', 'success');
      }, 300);
    }
  </script>
</body>
</html>
