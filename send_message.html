<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Send Message</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    
    body {
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      color: #f0f0f0;
    }

    
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }

    .card {
      margin-top: 80px;
      padding: 30px;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease;
      color: #212529;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
    }

    h3 {
      font-weight: 700;
      color: #2c3e50;
    }

    textarea.form-control {
      resize: none;
    }

    
    footer {
      width: 100%;
      text-align: center;
      padding: 15px 0;
      font-size: 1.1rem;
      color: #ffd700;
      position: fixed;
      bottom: 0;
      left: 0;
      font-weight: 600;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 5px #ffae00;
      background: transparent;
    }

    footer span {
      color: #ff7f50;
    }

   
    .btn-home {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 180px;
      font-weight: 600;
      border-radius: 50px;
      background: #007bff;
      box-shadow: 0 4px 15px rgba(0, 123, 255, 0.6);
      transition: background-color 0.3s ease, box-shadow 0.3s ease;
      z-index: 10;
    }

    .btn-home:hover {
      background-color: #0056b3;
      box-shadow: 0 6px 25px rgba(0, 86, 179, 0.9);
      text-decoration: none;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container d-flex justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <h3 class="text-center mb-4">Send a Message</h3>

        

        <form method="POST" action="/send-message">
          <div class="mb-3">
            <label for="sender" class="form-label">Sender ID</label>
            <input type="number" name="sender_id" id="sender" class="form-control" required />
          </div>
          <div class="mb-3">
            <label for="receiver" class="form-label">Receiver ID</label>
            <input type="number" name="receiver_id" id="receiver" class="form-control" required />
          </div>
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea name="message_text" id="message" class="form-control" rows="4" required></textarea>
          </div>
          <button type="submit" class="btn btn-success w-100">Send</button>
        </form>
      </div>
    </div>
  </div>

 
  <a href="/" class="btn btn-home text-white">Return to Home Page</a>

 
  <footer>✨ Created by Rabiya 😊 ✨</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
